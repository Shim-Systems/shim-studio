<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIM Brand Ecosystem & Theme Visualizer</title>
    <!-- Favicon Reference -->
    <link class="shim-favicon" rel="icon" type="image/svg+xml" href="favicon.svg">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for High-End Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Hide default scrollbars on visualizer frames */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col overflow-hidden">

    <!-- Theme Controller Dashboard Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <!-- Greyscale Corporate Logo -->
                <div class="flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="w-10 h-10">
                        <path d="M6 14 L18 26 C21 29 25 29 28 26 C31 23 31 19 28 16 L16 4 C13 1 9 1 6 4 C3 7 3 11 6 14 Z" fill="#94a3b8" fill-opacity="0.1"></path>
                        <path d="M11 9 L21 19" stroke-width="4.5" stroke="#cbd5e1"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                        SHIM <span class="text-slate-400 font-normal">| Theme Visualizer</span>
                    </h1>
                </div>
            </div>

            <!-- Static Status Indicator -->
            <div class="flex items-center gap-4 text-xs text-slate-400">
                <span class="flex items-center gap-1.5 font-mono">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                    Ecosystem Split Preview Active
                </span>
            </div>
        </div>
    </header>

    <!-- Visualizer Workspace Frames (Static Side-by-Side Split) -->
    <main class="flex-grow flex flex-col lg:flex-row h-[calc(100vh-73px)] overflow-hidden relative" id="visualizer-container">
        
        <!-- Studio Frame Container (Light Advisory) -->
        <div id="frame-container-studio" class="w-full lg:w-1/2 h-full border-b lg:border-b-0 lg:border-r border-slate-900">
            <iframe id="iframe-studio" src="index-studio.html"></iframe>
        </div>

        <!-- Systems Frame Container (Dark Delivery) -->
        <div id="frame-container-systems" class="w-full lg:w-1/2 h-full">
            <iframe id="iframe-systems" src="index-systems.html"></iframe>
        </div>

    </main>

    <script>
        // Init Lucide Icons in the header
        lucide.createIcons();
    </script>
</body>
</html>
